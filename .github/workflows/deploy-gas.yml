name: Deploy Google Apps Script

on:
  push:
    branches: [master]
    paths:
      - booking/Code.gs
  workflow_dispatch:

jobs:
  deploy-gas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials
        env:
          CLASP_CREDS: ${{ secrets.CLASP_CREDENTIALS }}
        run: echo "$CLASP_CREDS" > ~/.clasprc.json

      - name: Push
        working-directory: booking
        run: clasp push --force
