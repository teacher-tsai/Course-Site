name: Deploy Google Apps Script

on:
  push:
    branches: [master]
    paths:
      - booking/Code.gs
  workflow_dispatch:

jobs:
  deploy-gas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Debug credentials format
        run: cat ~/.clasprc.json | python3 -c "import sys,json; d=json.load(sys.stdin); print('keys:', list(d.keys()))"

      - name: Push
        working-directory: booking
        run: clasp push --force
