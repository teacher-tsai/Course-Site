name: Deploy to GitHub Pages

on:
  push:
    branches: [master, dev]

permissions:
  contents: write

jobs:
  sync-submodule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ssh-key: ${{ secrets.SUBMODULE_DEPLOY_KEY }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync submodule to matching branch
        env:
          SSH_KEY: ${{ secrets.SUBMODULE_DEPLOY_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # SSH key for reading private submodule
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/submodule_key
          chmod 600 ~/.ssh/submodule_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/submodule_key -o StrictHostKeyChecking=no"

          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            TARGET="main"
          else
            TARGET="dev"
          fi
          echo "Syncing course-content to origin/$TARGET"
          git -C course-content fetch origin $TARGET
          git -C course-content checkout origin/$TARGET

          if git diff --quiet course-content; then
            echo "Submodule already up to date"
          else
            git add course-content
            git commit -m "chore: sync submodule to course-content/$TARGET [skip ci]"
            # Push via HTTPS + GITHUB_TOKEN (SUBMODULE_DEPLOY_KEY has no write access here)
            git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
            git push
          fi

  test-on-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Confirm commit is on dev branch
        run: echo "OK"

  deploy:
    if: github.ref == 'refs/heads/master'
    needs: [sync-submodule]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ssh-key: ${{ secrets.SUBMODULE_DEPLOY_KEY }}
          ref: master

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    needs: [sync-submodule]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ssh-key: ${{ secrets.SUBMODULE_DEPLOY_KEY }}
          ref: dev

      - name: Deploy to /dev/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: dev
          keep_files: true
