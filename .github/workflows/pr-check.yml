name: PR Check

on:
  pull_request:
    branches: [master]

jobs:
  tested-on-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit exists in dev branch
        run: |
          git fetch origin dev
          if git merge-base --is-ancestor ${{ github.event.pull_request.head.sha }} origin/dev; then
            echo "Commit has been tested on dev branch"
          else
            echo "This commit has not been merged into dev yet"
            exit 1
          fi

  submodule-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ssh-key: ${{ secrets.SUBMODULE_DEPLOY_KEY }}
      - name: Verify submodule files exist
        run: |
          git submodule status
          test -f course-content/en.json && test -f course-content/zh.json
      - name: Verify submodule is on main at latest commit
        run: |
          git -C course-content fetch origin main
          SUBMODULE_COMMIT=$(git -C course-content rev-parse HEAD)
          MAIN_HEAD=$(git -C course-content rev-parse origin/main)
          echo "Submodule commit : $SUBMODULE_COMMIT"
          echo "origin/main HEAD : $MAIN_HEAD"
          if [ "$SUBMODULE_COMMIT" != "$MAIN_HEAD" ]; then
            echo "❌ Submodule is not pointing to the latest commit on main."
            echo "   Merge course-content changes to main first, then update the submodule pointer."
            exit 1
          fi
          echo "✅ Submodule is at origin/main HEAD"
