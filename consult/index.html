<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>預約諮詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#070b14;color:#e8edf7;font-family:'Noto Sans TC','Space Grotesk',sans-serif;min-height:100vh}
::selection{background:rgba(34,211,238,.3)}

/* ── Nav ── */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:rgba(7,11,20,.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07)}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:#e8edf7}
.nav-logo-icon{display:grid;place-items:center;width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#22d3ee);font-family:'JetBrains Mono',monospace;font-weight:700;color:#06121f;font-size:18px}
.nav-logo-text{font-weight:700;font-size:16px;letter-spacing:.3px}
.nav-back{display:flex;align-items:center;gap:6px;color:#9aa6bd;text-decoration:none;font-size:14px;font-weight:500;transition:color .15s}
.nav-back:hover{color:#e8edf7}

/* ── Layout ── */
.page{max-width:720px;margin:0 auto;padding:48px 24px 80px}
.page-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,4vw,40px);font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.page-sub{font-size:15px;color:#9aa6bd;margin-bottom:48px}

/* ── Card ── */
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:28px}
.card+.card{margin-top:16px}
.card-label{font-size:12px;font-family:'JetBrains Mono',monospace;color:#6b7a99;letter-spacing:.08em;text-transform:uppercase;margin-bottom:14px}

/* ── Choice cards ── */
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:0}
.choice-card{display:flex;flex-direction:column;gap:12px;padding:28px 24px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.025);cursor:pointer;transition:all .2s;text-align:left}
.choice-card:hover{border-color:rgba(59,130,246,.45);background:rgba(59,130,246,.06)}
.choice-icon{font-size:32px;line-height:1}
.choice-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:#e8edf7}
.choice-desc{font-size:14px;color:#9aa6bd;line-height:1.6}
.choice-arrow{font-size:20px;color:#3b82f6;margin-top:4px;transition:transform .2s}
.choice-card:hover .choice-arrow{transform:translateX(4px)}

/* ── Date tabs ── */
.date-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.date-scroll::-webkit-scrollbar{display:none}
.date-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#9aa6bd;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .15s}
.date-btn:hover{border-color:rgba(59,130,246,.4);color:#e8edf7}
.date-btn.active{background:rgba(59,130,246,.15);border-color:#3b82f6;color:#e8edf7}
.date-btn .weekday{font-size:11px;font-family:'JetBrains Mono',monospace;opacity:.7}
.date-btn .day{font-size:18px;font-weight:700}
.date-btn .month{font-size:11px;font-family:'JetBrains Mono',monospace;opacity:.6}

/* ── Time grid ── */
.time-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.time-btn{padding:10px 8px;border-radius:9px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:#9aa6bd;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}
.time-btn:hover{border-color:rgba(34,211,238,.5);color:#e8edf7}
.time-btn.active{background:rgba(34,211,238,.15);border-color:#22d3ee;color:#e8edf7}
.no-slots{color:#6b7a99;font-size:14px;padding:8px 0}

/* ── Form ── */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-group:last-of-type{margin-bottom:0}
.form-label{font-size:13px;font-weight:600;color:#aeb9cf}
.form-input,.form-textarea,.form-select{padding:11px 14px;border-radius:9px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#e8edf7;font-size:15px;font-family:'Noto Sans TC','Space Grotesk',sans-serif;outline:none;transition:border-color .15s;width:100%}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:#3b82f6}
.form-input::placeholder,.form-textarea::placeholder{color:#4a5568}
.form-textarea{resize:vertical;min-height:80px}
.form-select option{background:#0d1321;color:#e8edf7}

/* ── Summary strip ── */
.summary{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:14px 16px;border-radius:10px;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.2);margin-bottom:24px;font-size:13px}
.summary-item{display:flex;align-items:center;gap:6px;color:#9aa6bd}
.summary-item strong{color:#e8edf7;font-family:'JetBrains Mono',monospace}
.summary-dot{width:4px;height:4px;border-radius:99px;background:#6b7a99}

/* ── Buttons ── */
.btn-row{display:flex;gap:12px;margin-top:24px}
.btn{padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;border:none;font-family:'Space Grotesk',sans-serif}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#22d3ee);color:#06121f}
.btn-primary:hover{opacity:.9;box-shadow:0 8px 24px rgba(34,211,238,.2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.btn-ghost{background:rgba(255,255,255,.06);color:#9aa6bd;border:1px solid rgba(255,255,255,.1)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:#e8edf7}

/* ── States ── */
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.08);border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-center{display:flex;flex-direction:column;align-items:center;gap:16px;padding:64px 24px;text-align:center}
.state-icon{font-size:48px;line-height:1}
.state-title{font-size:20px;font-weight:700}
.state-sub{color:#9aa6bd;font-size:14px;line-height:1.7;max-width:360px}

/* ── Success ── */
.success-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:99px;background:rgba(34,211,238,.1);border:1px solid rgba(34,211,238,.25);color:#22d3ee;font-size:13px;font-family:'JetBrains Mono',monospace;margin-bottom:20px}
.success-details{width:100%;max-width:400px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:20px;margin:16px 0;text-align:left}
.success-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:14px}
.success-row:last-child{border-bottom:none}
.success-row .key{color:#9aa6bd}
.success-row .val{color:#e8edf7;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:13px}

/* ── Error banner ── */
.error-banner{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-radius:10px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:#fca5a5;font-size:13px;line-height:1.6;margin-top:12px}

/* ── Step indicator ── */
.steps{display:flex;align-items:center;gap:6px;margin-bottom:36px}
.step-dot{width:8px;height:8px;border-radius:99px;background:rgba(255,255,255,.12);transition:all .2s}
.step-dot.active{background:#3b82f6;width:24px}
.step-dot.done{background:rgba(59,130,246,.4)}

/* ── Setup notice ── */
.setup-notice{padding:24px;border-radius:12px;border:1px solid rgba(245,158,11,.25);background:rgba(245,158,11,.06);font-size:13px;line-height:1.8}
.setup-notice h3{color:#f59e0b;margin-bottom:8px;font-size:15px}
.setup-notice code{font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,.08);padding:2px 6px;border-radius:4px;font-size:12px}

@media(max-width:600px){
  .nav{padding:14px 20px}
  .page{padding:32px 16px 60px}
  .card{padding:20px}
  .choice-grid{grid-template-columns:1fr}
  .btn-row{flex-direction:column}
  .btn-row .btn{width:100%;text-align:center}
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <a class="nav-logo" href="../">
    <span class="nav-logo-icon">&gt;_</span>
    <span class="nav-logo-text">Reena Tsai</span>
  </a>
  <a class="nav-back" href="../">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    回到首頁
  </a>
</nav>

<div class="page">
  <h1 class="page-title">預約諮詢</h1>
  <p class="page-sub">有任何問題或想了解更多，歡迎留言或直接預約 10 分鐘的諮詢時段。</p>

  <!-- ── Screen: Not configured ── -->
  <div id="screen-setup" style="display:none">
    <div class="setup-notice">
      <h3>⚙️ 尚未設定 Google Apps Script</h3>
      <p style="color:#9aa6bd">請先完成 GAS 設定，再確認 <code>course-content/config.json</code> 中的 <code>gasUrl</code> 已填入。</p>
    </div>
  </div>

  <!-- ── Screen: Choice ── -->
  <div id="screen-choice">
    <div class="choice-grid">
      <button class="choice-card" onclick="startForm()">
        <span class="choice-icon">✉️</span>
        <span class="choice-title">留言諮詢</span>
        <span class="choice-desc">填寫表單，老師會盡快與你聯繫。</span>
        <span class="choice-arrow">→</span>
      </button>
      <button class="choice-card" onclick="startSlot()">
        <span class="choice-icon">📅</span>
        <span class="choice-title">預約時段</span>
        <span class="choice-desc">直接選一個 10 分鐘的空檔，線上快速了解。</span>
        <span class="choice-arrow">→</span>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════ -->
  <!-- PATH A: 留言諮詢                       -->
  <!-- ══════════════════════════════════════ -->

  <!-- ── Screen: Form embed ── -->
  <div id="screen-form-embed" style="display:none">
    <div class="btn-row" style="margin-top:0;margin-bottom:20px">
      <button class="btn btn-ghost" onclick="goToChoice()">← 返回</button>
    </div>
    <iframe id="consult-form-iframe" src="" width="100%" height="640"
      frameborder="0" marginheight="0" marginwidth="0"
      style="border-radius:12px;background:#fff;display:block">
      載入中…
    </iframe>
  </div>

  <!-- ══════════════════════════════════════ -->
  <!-- PATH B: 預約時段                       -->
  <!-- ══════════════════════════════════════ -->

  <!-- ── Screen: Slot loading ── -->
  <div id="screen-slot-loading" style="display:none">
    <div class="state-center">
      <div class="spinner"></div>
      <p style="color:#9aa6bd;font-size:14px">正在載入可預約時段…</p>
    </div>
  </div>

  <!-- ── Screen: Slot error ── -->
  <div id="screen-slot-error" style="display:none">
    <div class="state-center">
      <div class="state-icon">⚠️</div>
      <div class="state-title">載入失敗</div>
      <p class="state-sub" id="slot-error-msg">無法取得可預約時段，請稍後再試。</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button class="btn btn-ghost" onclick="loadSlots()">重試</button>
        <button class="btn btn-ghost" onclick="goToChoice()">← 返回</button>
      </div>
    </div>
  </div>

  <!-- ── Screen: Slot select (step 1) ── -->
  <div id="screen-slot-select" style="display:none">
    <div class="steps">
      <div class="step-dot active" id="slot-dot-0"></div>
      <div class="step-dot" id="slot-dot-1"></div>
    </div>

    <div class="card">
      <div class="card-label">選擇日期</div>
      <div class="date-scroll" id="date-scroll"></div>
    </div>

    <div class="card" id="times-card" style="display:none">
      <div class="card-label">選擇時段（每段 10 分鐘）</div>
      <div class="time-grid" id="time-grid"></div>
    </div>

    <div class="btn-row" id="slot-next-row" style="display:none">
      <button class="btn btn-ghost" onclick="goToChoice()">← 返回</button>
      <button class="btn btn-primary" onclick="goToSlotForm()">填寫資料 →</button>
    </div>
    <div class="btn-row" id="slot-back-row" style="display:none">
      <button class="btn btn-ghost" onclick="goToChoice()">← 返回</button>
    </div>
  </div>

  <!-- ── Screen: Slot form (step 2) ── -->
  <div id="screen-slot-form" style="display:none">
    <div class="steps">
      <div class="step-dot done"></div>
      <div class="step-dot active" style="width:24px"></div>
    </div>

    <div class="summary" id="slot-summary"></div>

    <div class="card">
      <div class="card-label">填寫資料</div>
      <div class="form-group">
        <label class="form-label" for="sf-name">姓名 <span style="color:#f87171">*</span></label>
        <input class="form-input" id="sf-name" type="text" placeholder="你的名字" required autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="sf-email">Email <span style="color:#f87171">*</span></label>
        <input class="form-input" id="sf-email" type="email" placeholder="email@example.com" required autocomplete="email">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label" for="sf-course">感興趣的課程</label>
        <select class="form-select" id="sf-course">
          <option value="">（選填）</option>
          <option value="Python">Python</option>
          <option value="Java">Java</option>
          <option value="都有興趣">都有興趣</option>
        </select>
      </div>
      <div id="slot-form-error" style="display:none" class="error-banner">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="slot-form-error-msg"></span>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="goToSlotSelect()">← 返回</button>
      <button class="btn btn-primary" id="slot-submit-btn" onclick="submitSlot()">確認預約</button>
    </div>
  </div>

  <!-- ── Screen: Slot submitting ── -->
  <div id="screen-slot-submitting" style="display:none">
    <div class="state-center">
      <div class="spinner"></div>
      <p style="color:#9aa6bd;font-size:14px">正在建立預約…</p>
    </div>
  </div>

  <!-- ── Screen: Slot success ── -->
  <div id="screen-slot-success" style="display:none">
    <div class="state-center">
      <div class="success-badge">✓ 諮詢預約成功</div>
      <div class="state-title">已送出！</div>
      <p class="state-sub">Google Calendar 邀請將寄送至你的 Email，請確認信件。</p>
      <div class="success-details" id="slot-success-details"></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:8px">
        <button class="btn btn-ghost" onclick="resetAll()">再預約一次</button>
        <a class="btn btn-ghost" href="../" style="display:inline-block;text-decoration:none">回到首頁</a>
      </div>
    </div>
  </div>
</div>

<script>
let GAS_URL = null;
let CONSULT_FORM_URL = null;

const slotState = {
  slots: [],   // [{date:'YYYY-MM-DD', slots:['HH:MM',...]}, ...]
  date: null,
  time: null,
};

const ALL_SCREENS = [
  'setup','choice',
  'form-embed',
  'slot-loading','slot-error','slot-select','slot-form','slot-submitting','slot-success',
];

function show(id) {
  ALL_SCREENS.forEach(s => {
    const el = document.getElementById('screen-' + s);
    if (el) el.style.display = (s === id) ? '' : 'none';
  });
}

// ── Init ─────────────────────────────────────────────────────
function init() {
  fetch('../course-content/config.json')
    .then(r => r.json())
    .then(cfg => {
      if (!cfg.gasUrl) { show('setup'); return; }
      GAS_URL = cfg.gasUrl;
      CONSULT_FORM_URL = cfg.consultFormUrl || null;
      show('choice');
    })
    .catch(() => { show('setup'); });
}

function goToChoice() {
  show('choice');
}

function resetAll() {
  slotState.slots = [];
  slotState.date = null;
  slotState.time = null;
  document.getElementById('sf-name').value = '';
  document.getElementById('sf-email').value = '';
  document.getElementById('sf-course').value = '';
  show('choice');
}

// ══════════════════════════════════════════════════════════
// PATH A: 留言諮詢
// ══════════════════════════════════════════════════════════

function startForm() {
  document.getElementById('consult-form-iframe').src = CONSULT_FORM_URL + '?embedded=true';
  show('form-embed');
}

// ══════════════════════════════════════════════════════════
// PATH B: 預約時段
// ══════════════════════════════════════════════════════════

function startSlot() {
  loadSlots();
}

function loadSlots() {
  show('slot-loading');
  fetch(GAS_URL + '?type=consult', { redirect: 'follow' })
    .then(r => r.json())
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'server error');
      slotState.slots = data.slots || [];
      show('slot-select');
      renderDates();
    })
    .catch(err => {
      document.getElementById('slot-error-msg').textContent =
        '無法取得可預約時段：' + err.message;
      show('slot-error');
    });
}

// ── 日期清單 ─────────────────────────────────────────────
function renderDates() {
  const scroll = document.getElementById('date-scroll');
  scroll.innerHTML = '';

  if (slotState.slots.length === 0) {
    scroll.innerHTML = '<p class="no-slots">目前沒有可預約的諮詢時段，請稍後再試。</p>';
    document.getElementById('slot-back-row').style.display = '';
    return;
  }

  slotState.slots.forEach(d => {
    const btn = document.createElement('button');
    btn.className = 'date-btn';
    btn.innerHTML = formatDateBtn(d.date);
    btn.onclick = () => selectDate(d.date);
    scroll.appendChild(btn);
  });

  if (slotState.date && slotState.slots.find(d => d.date === slotState.date)) {
    renderTimes(slotState.date);
    highlightDate(slotState.date);
  }
}

function selectDate(dateStr) {
  slotState.date = dateStr;
  slotState.time = null;
  highlightDate(dateStr);
  renderTimes(dateStr);
  document.getElementById('slot-next-row').style.display = 'none';
}

function highlightDate(dateStr) {
  document.querySelectorAll('.date-btn').forEach((btn, i) => {
    btn.classList.toggle('active', slotState.slots[i]?.date === dateStr);
  });
}

function formatDateBtn(dateStr) {
  const date = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const diff = Math.round((date - today) / 86400000);
  const wd = ['日','一','二','三','四','五','六'][date.getDay()];
  const mo = date.getMonth() + 1;
  const d = date.getDate();
  const label = diff === 0 ? '今天' : diff === 1 ? '明天' : `週${wd}`;
  return `<span class="weekday">${label}</span><span class="day">${d}</span><span class="month">${mo} 月</span>`;
}

// ── 時段 grid ─────────────────────────────────────────────
function renderTimes(dateStr) {
  const dateObj = slotState.slots.find(d => d.date === dateStr);
  const grid = document.getElementById('time-grid');
  grid.innerHTML = '';

  if (!dateObj || dateObj.slots.length === 0) {
    grid.innerHTML = '<p class="no-slots">此日期目前沒有空檔。</p>';
    document.getElementById('times-card').style.display = '';
    return;
  }

  dateObj.slots.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'time-btn';
    btn.textContent = t;
    btn.onclick = () => selectTime(t);
    grid.appendChild(btn);
  });

  document.getElementById('times-card').style.display = '';

  if (slotState.time && dateObj.slots.includes(slotState.time)) {
    highlightTime(slotState.time);
  }
}

function selectTime(timeStr) {
  slotState.time = timeStr;
  highlightTime(timeStr);
  document.getElementById('slot-next-row').style.display = '';
  document.getElementById('slot-back-row').style.display = 'none';
}

function highlightTime(timeStr) {
  document.querySelectorAll('.time-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === timeStr);
  });
}

// ── 切換到表單 ────────────────────────────────────────────
function goToSlotForm() {
  if (!slotState.date || !slotState.time) return;
  updateSlotSummary();
  document.getElementById('slot-form-error').style.display = 'none';
  show('slot-form');
}

function goToSlotSelect() {
  show('slot-select');
}

function updateSlotSummary() {
  const d = new Date(slotState.date + 'T00:00:00');
  const wd = ['日','一','二','三','四','五','六'][d.getDay()];
  const dateLabel = `${d.getMonth()+1}/${d.getDate()}（週${wd}）`;
  const [h, m] = slotState.time.split(':').map(Number);
  const endTotal = h * 60 + m + 10;
  const endStr = String(Math.floor(endTotal/60)).padStart(2,'0') + ':' + String(endTotal%60).padStart(2,'0');

  document.getElementById('slot-summary').innerHTML = `
    <span class="summary-item">📅 <strong>${dateLabel}</strong></span>
    <span class="summary-dot"></span>
    <span class="summary-item">🕐 <strong>${slotState.time} – ${endStr}</strong></span>
    <span class="summary-dot"></span>
    <span class="summary-item">⏱ <strong>10 分鐘</strong></span>
  `;
}

// ── 送出預約 ─────────────────────────────────────────────
function submitSlot() {
  const name   = document.getElementById('sf-name').value.trim();
  const email  = document.getElementById('sf-email').value.trim();
  const course = document.getElementById('sf-course').value;

  if (!name) { showSlotFormError('請填寫姓名。'); return; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showSlotFormError('請填寫有效的 Email 地址。'); return;
  }

  document.getElementById('slot-submit-btn').disabled = true;
  show('slot-submitting');

  const body = new URLSearchParams({
    type: 'consult-slot',
    date: slotState.date,
    time: slotState.time,
    name,
    email,
    course,
  });

  fetch(GAS_URL, { method: 'POST', body, redirect: 'follow' })
    .then(r => r.json())
    .then(data => {
      if (!data.ok) {
        if (data.error === 'conflict') throw new Error('此時段剛被預約，請重新選擇時間。');
        throw new Error(data.error || '伺服器錯誤');
      }
      showSlotSuccess(name, email);
    })
    .catch(err => {
      document.getElementById('slot-submit-btn').disabled = false;
      show('slot-form');
      showSlotFormError(err.message || '送出失敗，請稍後再試。');
    });
}

function showSlotFormError(msg) {
  const el = document.getElementById('slot-form-error');
  document.getElementById('slot-form-error-msg').textContent = msg;
  el.style.display = 'flex';
}

function showSlotSuccess(name, email) {
  const d = new Date(slotState.date + 'T00:00:00');
  const wd = ['日','一','二','三','四','五','六'][d.getDay()];
  const dateLabel = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（週${wd}）`;
  const [h, m] = slotState.time.split(':').map(Number);
  const endTotal = h * 60 + m + 10;
  const endStr = String(Math.floor(endTotal/60)).padStart(2,'0') + ':' + String(endTotal%60).padStart(2,'0');

  document.getElementById('slot-success-details').innerHTML = `
    <div class="success-row"><span class="key">日期</span><span class="val">${dateLabel}</span></div>
    <div class="success-row"><span class="key">時間</span><span class="val">${slotState.time} – ${endStr}</span></div>
    <div class="success-row"><span class="key">時長</span><span class="val">10 分鐘</span></div>
    <div class="success-row"><span class="key">姓名</span><span class="val">${escHtml(name)}</span></div>
    <div class="success-row"><span class="key">通知寄至</span><span class="val" style="font-size:12px;word-break:break-all">${escHtml(email)}</span></div>
  `;
  show('slot-success');
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

init();
</script>
</body>
</html>
